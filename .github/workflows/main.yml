name: Windows 10 RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # Giới hạn tối đa của GitHub Actions là 6 tiếng (360 phút)

    steps:
    - name: Tải Ngrok mới nhất
      run: |
        Invoke-WebRequest https://equinox.io -OutFile ngrok.zip
    
    - name: Giải nén Ngrok
      run: |
        Expand-Archive ngrok.zip -DestinationPath .
        
    - name: Xác thực tài khoản Ngrok
      run: |
        .\ngrok.exe config add-authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        
    - name: Kích hoạt Remote Desktop (RDP)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: Tạo mật khẩu mới cho Runner
      run: |
        $Password = ConvertTo-SecureString "Cyb3rking@2026" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Khởi tạo kết nối công khai
      run: |
        Start-Process .\ngrok.exe -ArgumentList "tcp 3389"
        Start-Sleep -Seconds 10
        
    - name: Lấy thông tin kết nối RDP
      run: |
        $NgrokPublicUrl = (Invoke-RestMethod http://127.0.0).tunnels.public_url
        Write-Host "=============================================" -ForegroundColor Green
        Write-Host "ĐỊA CHỈ IP RDP: $NgrokPublicUrl" -ForegroundColor Cyan
        Write-Host "USERNAME: runneradmin" -ForegroundColor Cyan
        Write-Host "PASSWORD: Cyb3rking@2026" -ForegroundColor Cyan
        Write-Host "=============================================" -ForegroundColor Green
        
    - name: Duy trì máy ảo hoạt động
      run: |
        while ($true) { Start-Sleep -Seconds 60 }
        
