name: Windows 10 RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: 1. Tải Ngrok Phiên Bản Mới
      run: |
        Invoke-WebRequest -Uri "https://equinox.io" -OutFile ngrok.zip
    
    - name: 2. Giải Nén Ngrok
      run: |
        New-Item -ItemType Directory -Force -Path C:\ngrok_files
        Expand-Archive -Path .\ngrok.zip -DestinationPath C:\ngrok_files -Force
        
    - name: 3. Xác thực tài khoản Ngrok
      run: |
        C:\ngrok_files\ngrok.exe config add-authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        
    - name: 4. Kích hoạt Remote Desktop (RDP)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: 5. Đổi Mật Khẩu Hợp Lệ
      run: |
        $Password = ConvertTo-SecureString "Cyb3rking@2026" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: 6. Khởi tạo đường truyền Ngrok dưới nền
      run: |
        Start-Process C:\ngrok_files\ngrok.exe -ArgumentList "tcp 3389"
        
    - name: 7. Lấy Thông Tin Kết Nối RDP (Tự Động Thử Lại Nếu Chậm)
      run: |
        $maxAttempts = 12
        $attempt = 1
        $NgrokPublicUrl = $null
        
        Write-Host "Đang chờ Ngrok tạo đường truyền kết nối..." -ForegroundColor Yellow
        
        while ($null -eq $NgrokPublicUrl -and $attempt -le $maxAttempts) {
            try {
                $NgrokPublicUrl = (Invoke-RestMethod -Uri "http://127.0.0" -TimeoutSec 5).tunnels.public_url
                if (-not $NgrokPublicUrl) { throw "Đang tải dữ liệu..." }
            } catch {
                Write-Host "Thử lại lần $attempt/$maxAttempts: Ngrok đang khởi động..." -ForegroundColor Yellow
                Start-Sleep -Seconds 5
                $attempt++
            }
        }
        
        if ($NgrokPublicUrl) {
            $CleanUrl = $NgrokPublicUrl -replace "tcp://", ""
            Write-Host "=============================================" -ForegroundColor Green
            Write-Host " KẾT NỐI THÀNH CÔNG! THÔNG TIN RDP CỦA BẠN:" -ForegroundColor Green
            Write-Host " ĐỊA CHỈ IP RDP: $CleanUrl" -ForegroundColor Cyan
            Write-Host " USERNAME: runneradmin" -ForegroundColor Cyan
            Write-Host " PASSWORD: Cyb3rking@2026" -ForegroundColor Cyan
            Write-Host "=============================================" -ForegroundColor Green
        } else {
            Write-Host "❌ LỖI QUÁ THỜI GIAN: Ngrok không phản hồi sau 1 phút!" -ForegroundColor Red
            Write-Host "👉 Vui lòng kiểm tra lại xem biến 'NGROK_AUTH_TOKEN' trong Settings > Secrets đã đúng chưa." -ForegroundColor Yellow
            exit 1
        }
        
    - name: 8. Duy trì máy ảo liên tục
      run: |
        while ($true) { Start-Sleep -Seconds 60 }
        
