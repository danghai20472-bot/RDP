name: Windows 10 RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # Giới hạn chạy tối đa của GitHub Actions là 6 tiếng

    steps:
    - name: 1. Tải Ngrok Phiên Bản Mới
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
    
    - name: 2. Sửa lỗi Giải Nén (Tạo thư mục cố định)
      run: |
        New-Item -ItemType Directory -Force -Path C:\ngrok_files
        Expand-Archive -Path .\ngrok.zip -DestinationPath C:\ngrok_files -Force
        
    - name: 3. Xác thực tài khoản Ngrok
      run: |
        C:\ngrok_files\ngrok.exe config add-authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        
    - name: 4. Kích hoạt Remote Desktop (RDP)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: 5. Đổi Mật Khẩu Hợp Lệ (Có chữ hoa, thường, số, ký tự đặc biệt)
      run: |
        $Password = ConvertTo-SecureString "Cyb3rking@2026" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: 6. Khởi tạo đường truyền Ngrok dưới nền
      run: |
        Start-Process C:\ngrok_files\ngrok.exe -ArgumentList "tcp 3389"
        Start-Sleep -Seconds 10
        
    - name: 7. Lấy Thông Tin Kết Nối RDP Xuất Ra Màn Hình
      run: |
        $NgrokPublicUrl = (Invoke-RestMethod http://127.0.0).tunnels.public_url
        Write-Host "=============================================" -ForegroundColor Green
        Write-Host " ĐỊA CHỈ IP RDP: $NgrokPublicUrl" -ForegroundColor Cyan
        Write-Host " USERNAME: runneradmin" -ForegroundColor Cyan
        Write-Host " PASSWORD: Cyb3rking@2026" -ForegroundColor Cyan
        Write-Host "=============================================" -ForegroundColor Green
        
    - name: 8. Duy trì máy ảo liên tục
      run: |
        while ($true) { Start-Sleep -Seconds 60 }
        
